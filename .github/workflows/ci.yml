name: Template CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  acceptance:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Mint lab app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.LAB_APP_ID }}
          private-key: ${{ secrets.LAB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Enable symlink checkout
        shell: bash
        run: git config --global core.symlinks true
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}
      - name: Configure private Git authentication
        shell: bash
        env:
          LAB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: git config --global url."https://x-access-token:${LAB_TOKEN}@github.com/".insteadOf "https://github.com/"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install pinned Copier
        shell: bash
        run: python -m pip install "copier==9.16.0"
      - name: Run template acceptance
        shell: bash
        run: |
          set -o pipefail
          python tests/template_acceptance.py 2>&1 | tee acceptance.log
      - name: Upload acceptance diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-${{ matrix.os }}
          path: acceptance.log
          if-no-files-found: error
