name: Template CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Mint lab app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.LAB_APP_ID }}
          private-key: ${{ secrets.LAB_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}
      - name: Configure private submodule authentication
        env:
          LAB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: git config --global url."https://x-access-token:${LAB_TOKEN}@github.com/".insteadOf "https://github.com/"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: python -m pip install "copier==9.16.0"
      - run: tests/render-smoke.sh
