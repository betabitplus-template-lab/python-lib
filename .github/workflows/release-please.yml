name: Release Please
on:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  acceptance:
    permissions:
      contents: read
    uses: betabitplus-template-lab/automation/.github/workflows/template-acceptance.yml@651d2a3e95bc03a5157276181ec3fbd2f3527951
    secrets:
      private-read-token: ${{ secrets.TEMPLATE_READ_TOKEN }}
  release:
    needs: acceptance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Mint release App token
        id: app-token
        uses: actions/create-github-app-token@def152b8a737443d7af6c5722c6389146fe90c90 # v2.1.2
        with:
          app-id: ${{ secrets.LAB_APP_ID }}
          private-key: ${{ secrets.LAB_APP_PRIVATE_KEY }}
          owner: betabitplus-template-lab
          repositories: ${{ github.event.repository.name }}
          permission-contents: write
          permission-pull-requests: write
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Exact-SHA release guard
        if: steps.release.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ steps.release.outputs.tag_name }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
        run: |
          ref_type="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.type')"
          ref_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}" --jq '.object.sha')"
          if test "$ref_type" = tag; then
            actual="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${ref_sha}" --jq '.object.sha')"
          else
            actual="$ref_sha"
          fi
          main_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
          test "$actual" = "$RELEASE_SHA"
          test "$actual" = "$main_sha"
